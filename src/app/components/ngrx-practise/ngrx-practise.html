<h2 class="text-center text-primary mt-2">NgRx Practise</h2>

<div class="container mt-5 text-center">
    <div class="row">

        <div class="col-4">
            <button class="btn btn-success" (click)="increment()">Increment</button>
        </div>
        <div class="col-4">
            <button class="btn btn-warning" (click)="decrement()">Decrement</button>
        </div>
        <div class="col-4">
            <button class="btn btn-secondary" (click)="reset()">Reset</button>
        </div>
    </div>
</div>

<div class="text-center text-primary mt-5">Counter result: {{ counter$ | async }}</div>

<hr>
<div class="row">
    <div class="col text-center">
        <app-custome-ngrx></app-custome-ngrx>        
    </div>    
</div>

<hr>

<div class="container">
    <div class="row mt-3 text-center">
        <div class="col">
            <app-admin></app-admin>
        </div>
        <div class="col">
            <app-user></app-user>
        </div>
    </div>
</div>
