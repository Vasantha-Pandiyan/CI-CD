<h2 class="text-center mt-4 text-dark">Login Form</h2>
<div class="d-flex justify-content-center align-items-center mb-1" style="height: 60vh;margin:1rem auto;">
    <div class="card p-4 shadow w-50">
        <div class="card-body">
            <form #myForm="ngForm" (ngSubmit)="loginForm(myForm)">
                <div class="mb-2">
                    <label for="username" class="form-label">User Name</label>
                    <input #username="ngModel" type="text" id="username" name="username" class="form-control" [(ngModel)]="loginObj.username" required>
                </div>
                @if(username.invalid && username.touched) {
                    <div class="error">The username is required</div>
                }
                <div class="mb-2">
                    <label for="password" class="form-label">Password</label>
                    <input #password="ngModel" type="password" id="password" name="password" class="form-control" [(ngModel)]="loginObj.password" required>
                </div>
                <div>
                @if(password.invalid && password.touched) {
                    <div class="error">The password is required</div>
                }
                </div>
                <div class="d-flex justify-content-center mt-3">
                    <button type="submit" class="btn btn-primary mx-3" [disabled]="myForm.invalid">Submit</button>
                    <button class="btn btn-primary" (click)="newUser()">New User</button>
                </div>
            </form>
        </div>
    </div>    
</div>

<div class="mb-3">{{loginObj | json}}</div>
